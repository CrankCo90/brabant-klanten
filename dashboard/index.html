<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brabant Digital — Beheer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f0f12;color:#ece9e2;font-weight:300;line-height:1.5}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0c0c0f}
#login canvas{position:absolute;inset:0}
#login .glow{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5}
#login .g1{width:420px;height:420px;background:#c9a96a;top:-120px;left:-80px;animation:float1 14s ease-in-out infinite}
#login .g2{width:380px;height:380px;background:#6b4a1f;bottom:-120px;right:-60px;animation:float2 18s ease-in-out infinite}
@keyframes float1{50%{transform:translate(120px,90px) scale(1.15)}}
@keyframes float2{50%{transform:translate(-100px,-70px) scale(1.1)}}
.card{position:relative;z-index:2;width:90%;max-width:380px;background:rgba(23,23,28,.72);backdrop-filter:blur(16px);border:1px solid rgba(201,169,106,.35);border-radius:20px;padding:40px 34px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.55);animation:rise .8s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.mark{width:56px;height:56px;border-radius:15px;background:linear-gradient(135deg,#e7c987,#9c7a3f);display:grid;place-items:center;color:#15151a;font-weight:700;font-family:'Playfair Display',serif;font-size:1.6rem;margin:0 auto 18px;box-shadow:0 8px 24px rgba(201,169,106,.4)}
.card h1{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;letter-spacing:.01em;background:linear-gradient(90deg,#c9a96a,#f3e3bd,#c9a96a);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 5s linear infinite}
@keyframes shine{to{background-position:200% center}}
.card .sub{font-size:.72rem;color:#8d887e;letter-spacing:.22em;text-transform:uppercase;margin:4px 0 26px}
.card input{width:100%;background:rgba(15,15,18,.8);border:1px solid rgba(201,169,106,.3);border-radius:11px;padding:14px 16px;color:#ece9e2;font-family:inherit;font-size:.95rem;text-align:center;letter-spacing:.05em}
.card input:focus{outline:none;border-color:#c9a96a}
.card button{width:100%;margin-top:12px;background:linear-gradient(135deg,#e7c987,#c9a96a);color:#15151a;border:none;border-radius:999px;padding:14px;font-weight:600;font-size:.95rem;cursor:pointer;font-family:inherit;transition:.2s}
.card button:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(201,169,106,.4)}
.card .err{color:#e2746a;font-size:.82rem;margin-top:12px;min-height:18px}
.shake{animation:shake .4s}
@keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
/* ---------- DASHBOARD ---------- */
#app{display:none}
.top{border-bottom:1px solid rgba(201,169,106,.2);background:#14141a;position:sticky;top:0;z-index:20}
.top .wrap{display:flex;align-items:center;gap:14px;padding:16px 24px}
.brand{display:flex;align-items:center;gap:10px;margin-right:auto}
.bmark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#c9a96a,#9c7a3f);display:grid;place-items:center;color:#15151a;font-weight:700;font-family:'Playfair Display',serif}
.brand b{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.brand span{display:block;font-size:.66rem;color:#8d887e;letter-spacing:.14em;text-transform:uppercase}
.btn{background:none;border:1px solid rgba(201,169,106,.5);color:#c9a96a;border-radius:8px;padding:8px 14px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit}
.btn.gold{background:#c9a96a;color:#15151a;border-color:#c9a96a}
.btn:hover{opacity:.88}
section{padding:26px 0}
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.stat{background:#17171c;border:1px solid rgba(201,169,106,.16);border-radius:14px;padding:18px}
.stat .lbl{font-size:.74rem;color:#8d887e;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.stat .val{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:700;color:#c9a96a;line-height:1}
.stat.green .val{color:#97c459}.stat.red .val{color:#e2746a}.stat.amber .val{color:#efa927}
.panels{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;margin-top:18px}
.panel{background:#17171c;border:1px solid rgba(201,169,106,.16);border-radius:14px;padding:20px 22px}
.panel h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;margin-bottom:14px;color:#f3eddf}
.bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin:6px 0 18px}
.bar .lab{font-size:.78rem;color:#8d887e;margin-right:4px}
.chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#c4bfb4;border-radius:999px;padding:6px 13px;font-size:.8rem;cursor:pointer}
.chip.on{background:#c9a96a;color:#15151a;border-color:#c9a96a}
.group{margin-bottom:22px}
.group h4{font-family:'Playfair Display',serif;font-size:1.05rem;color:#c9a96a;border-bottom:1px solid rgba(201,169,106,.2);padding-bottom:8px;margin-bottom:6px;display:flex;justify-content:space-between}
.group h4 span{font-family:'Inter';font-size:.78rem;color:#8d887e;font-weight:400}
.row{display:grid;grid-template-columns:1.4fr 1fr auto auto;gap:12px;align-items:center;padding:12px 6px;border-bottom:1px solid rgba(255,255,255,.06)}
.row .b{font-weight:500}.row .m{font-size:.82rem;color:#8d887e}
.row a{color:#7fb0e0;text-decoration:none;font-size:.82rem}
.badge{font-size:.72rem;font-weight:600;padding:4px 11px;border-radius:999px;text-align:center;white-space:nowrap}
.s-nieuw{background:rgba(136,135,128,.2);color:#b4b2a9}
.s-demo{background:rgba(55,138,221,.18);color:#85b7eb}
.s-benaderd{background:rgba(239,159,39,.18);color:#efa927}
.s-ja{background:rgba(151,196,89,.2);color:#97c459}
.s-nee{background:rgba(226,116,106,.18);color:#e2746a}
form.add{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
form.add input,form.add textarea{background:#0f0f12;border:1px solid rgba(201,169,106,.3);border-radius:9px;padding:11px 13px;color:#ece9e2;font-family:inherit;font-size:.9rem}
form.add .full{grid-column:1/3}
form.add button{grid-column:1/3;background:#c9a96a;color:#15151a;border:none;border-radius:999px;padding:13px;font-weight:600;cursor:pointer;font-family:inherit}
canvas#cStatus,canvas#cNiche{max-height:240px}
.note{color:#6f6a60;font-size:.76rem;margin-top:8px}
@media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)}.panels{grid-template-columns:1fr}.row{grid-template-columns:1fr auto}form.add{grid-template-columns:1fr}form.add .full,form.add button{grid-column:1}}
</style></head>
<body>

<div id="login">
  <canvas id="dust"></canvas>
  <div class="glow g1"></div><div class="glow g2"></div>
  <div class="card" id="card">
    <div class="mark">B</div>
    <h1>Brabant Digital</h1>
    <div class="sub">Beheer</div>
    <input type="password" id="pw" placeholder="Wachtwoord" autocomplete="current-password">
    <button id="go">Inloggen</button>
    <div class="err" id="err"></div>
  </div>
</div>

<div id="app">
  <div class="top"><div class="wrap">
    <span class="brand"><span class="bmark">B</span><span><b>Brabant Digital</b><span>Beheer-dashboard</span></span></span>
    <button class="btn" onclick="location.reload()">Vernieuwen</button>
    <button class="btn gold" onclick="document.getElementById('add').scrollIntoView({behavior:'smooth'})">+ Klant</button>
  </div></div>
  <div class="wrap">
    <section>
      <div class="cards" id="stats"></div>
      <div class="panels">
        <div class="panel"><h3>Status-verdeling</h3><canvas id="cStatus"></canvas></div>
        <div class="panel"><h3>Klanten per niche</h3><canvas id="cNiche"></canvas></div>
      </div>
    </section>
    <section>
      <div class="bar"><span class="lab">Groeperen:</span>
        <span class="chip" data-group="niche">Per niche</span>
        <span class="chip" data-group="werkdag">Per werkdag</span>
      </div>
      <div class="bar"><span class="lab">Status:</span><span id="statusFilters"></span></div>
      <div id="list"></div>
    </section>
    <section id="add">
      <div class="panel">
        <h3>Nieuwe klant / website toevoegen</h3>
        <form class="add" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="ef050157-d2a3-43ce-89c2-6088aa1b8bf2">
          <input type="hidden" name="subject" value="Nieuwe klant voor dashboard — Brabant Digital">
          <input type="text" name="bedrijf" placeholder="Bedrijfsnaam" required>
          <input type="text" name="niche" placeholder="Niche (bv. Hondentrimsalons)" required>
          <input type="text" name="regio" placeholder="Regio (bv. Noord-Brabant)">
          <input type="text" name="link" placeholder="Website of social-link">
          <textarea class="full" name="notitie" rows="2" placeholder="Notitie (optioneel)"></textarea>
          <button type="submit">Aanmelden — Claude pakt het op</button>
        </form>
        <p class="note">Na aanmelden komt de klant binnen op aanbod@brabantdigital.nl en zet Claude 'm in het dashboard + gaat ermee aan de slag.</p>
      </div>
    </section>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const PWHASH="419ecc575146d1431229d51c92a9cf88213d3a349310a5c983494411030ca22b";
const $=s=>document.querySelector(s);
// gouden stofdeeltjes
(function(){const cv=$('#dust'),cx=cv.getContext('2d');let W,H,P;
function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;P=Array.from({length:70},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.8+.4,s:Math.random()*.4+.1,o:Math.random()*.5+.2}))}
rs();addEventListener('resize',rs);
(function loop(){cx.clearRect(0,0,W,H);P.forEach(p=>{p.y-=p.s;if(p.y<-5){p.y=H+5;p.x=Math.random()*W}cx.beginPath();cx.arc(p.x,p.y,p.r,0,7);cx.fillStyle='rgba(201,169,106,'+p.o+')';cx.fill()});requestAnimationFrame(loop)})();})();
// inloggen
async function sha(t){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
async function tryLogin(){const v=$('#pw').value;
  if(await sha(v)===PWHASH){sessionStorage.setItem('bd_ok','1');unlock();}
  else{$('#err').textContent='Onjuist wachtwoord';$('#card').classList.remove('shake');void $('#card').offsetWidth;$('#card').classList.add('shake');}}
$('#go').onclick=tryLogin; $('#pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
function unlock(){$('#login').style.display='none';$('#app').style.display='block';init();}
if(sessionStorage.getItem('bd_ok')==='1'){unlock();}else{setTimeout(()=>$('#pw').focus(),300);}

// ---------- dashboard ----------
const STATUS=[["nieuw","Nieuw"],["demo","Demo klaar"],["benaderd","Benaderd"],["ja","Gekocht"],["nee","Afgewezen"]];
const COL={nieuw:"#888780",demo:"#378add",benaderd:"#efa927",ja:"#97c459",nee:"#e2746a"};
let DATA=[], group=localStorage.getItem('bd_group')||'niche', active=new Set(STATUS.map(s=>s[0])), charted=false;
function stats(){const c=Object.fromEntries(STATUS.map(s=>[s[0],0]));DATA.forEach(d=>c[d.status]=(c[d.status]||0)+1);
  const benaderd=c.benaderd+c.ja+c.nee, conv=(c.ja+c.nee)?Math.round(c.ja/(c.ja+c.nee)*100):0;
  $('#stats').innerHTML=[['Totaal klanten',DATA.length,''],['Benaderd',benaderd,''],['Gekocht',c.ja,'green'],['Afgewezen',c.nee,'red'],['Conversie',conv+'%','amber']]
    .map(([l,v,k])=>`<div class="stat ${k}"><div class="lbl">${l}</div><div class="val">${v}</div></div>`).join('');return c;}
function charts(c){if(charted)return;charted=true;
  new Chart($('#cStatus'),{type:'doughnut',data:{labels:STATUS.map(s=>s[1]),datasets:[{data:STATUS.map(s=>c[s[0]]||0),backgroundColor:STATUS.map(s=>COL[s[0]]),borderColor:'#17171c',borderWidth:2}]},options:{plugins:{legend:{labels:{color:'#c4bfb4',font:{size:12}}}}}});
  const n=[...new Set(DATA.map(d=>d.niche))];
  new Chart($('#cNiche'),{type:'bar',data:{labels:n,datasets:[{data:n.map(x=>DATA.filter(d=>d.niche===x).length),backgroundColor:'#c9a96a'}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#c4bfb4'},grid:{display:false}},y:{ticks:{color:'#8d887e',stepSize:1},grid:{color:'rgba(255,255,255,.06)'}}}}});}
function filters(){$('#statusFilters').innerHTML=STATUS.map(s=>`<span class="chip ${active.has(s[0])?'on':''}" data-s="${s[0]}">${s[1]}</span>`).join(' ');
  document.querySelectorAll('[data-s]').forEach(c=>c.onclick=()=>{const s=c.dataset.s;active.has(s)?active.delete(s):active.add(s);filters();list();});}
function badge(s){const n=STATUS.find(x=>x[0]===s);return `<span class="badge s-${s}">${n?n[1]:s}</span>`;}
function list(){const rows=DATA.filter(d=>active.has(d.status));
  const keys=[...new Set(rows.map(d=>group==='niche'?d.niche:d.werkdag))].sort().reverse();
  $('#list').innerHTML=keys.map(k=>{const items=rows.filter(d=>(group==='niche'?d.niche:d.werkdag)===k);
    const sub=group==='werkdag'?[...new Set(items.map(i=>i.niche))].join(', '):items.length+' klant(en)';
    return `<div class="group"><h4>${k||'—'} <span>${sub}</span></h4>`+items.map(d=>`
      <div class="row"><div><div class="b">${d.bedrijf}</div><div class="m">${d.regio||''}</div></div>
      <div class="m">${group==='niche'?('Werkdag: '+(d.werkdag||'—')):d.niche}${d.demo_url?` · <a href="${d.demo_url}" target="_blank">demo ↗</a>`:''}</div>
      <div>${badge(d.status)}</div><div class="m" title="${(d.notitie||'').replace(/"/g,'&quot;')}">${d.notitie?'ℹ︎':''}</div></div>`).join('')+`</div>`;
  }).join('')||'<p class="note">Geen klanten in deze selectie.</p>';}
function setGroup(g){group=g;localStorage.setItem('bd_group',g);document.querySelectorAll('[data-group]').forEach(c=>c.classList.toggle('on',c.dataset.group===g));list();}
document.querySelectorAll('[data-group]').forEach(c=>c.onclick=()=>setGroup(c.dataset.group));
function init(){fetch('clients.json?'+Date.now()).then(r=>r.json()).then(d=>{DATA=d.sort((a,b)=>(b.werkdag||'').localeCompare(a.werkdag||''));const c=stats();charts(c);filters();setGroup(group);}).catch(e=>{$('#list').innerHTML='<p class="note">Kon clients.json niet laden: '+e+'</p>';});}
</script>
</body></html>
